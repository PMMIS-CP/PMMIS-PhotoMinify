name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'               # با ایجاد تگ (مثل v1.0.0) هم بیلد بشه
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # امکان اجرای دستی از طریق GitHub

jobs:
  build:
    runs-on: windows-latest  # حتماً ویندوز باشه چون به magick.exe نیاز داری
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # یا هر نسخه‌ای که استفاده می‌کنی

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller webp_gui.spec

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebP_Converter_Windows
        path: dist/WebP_Converter.exe
        retention-days: 30  # مدت نگهداری (حداکثر 90 روز)

    # (اختیاری) ساخت Release خودکار هنگام ایجاد تگ
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/WebP_Converter.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}